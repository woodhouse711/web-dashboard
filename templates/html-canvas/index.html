<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Study</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0c0c0c; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Your sketch starts here ──────────────────────────────
    let t = 0;

    function draw() {
      const W = canvas.width, H = canvas.height;

      ctx.fillStyle = 'rgba(12,12,12,0.15)';
      ctx.fillRect(0, 0, W, H);

      // Example: animated circle
      const x = W/2 + Math.cos(t) * W * 0.2;
      const y = H/2 + Math.sin(t * 0.7) * H * 0.2;

      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#4a9eff';
      ctx.fill();

      t += 0.02;
      requestAnimationFrame(draw);
    }

    draw();
    // ── Your sketch ends here ────────────────────────────────
  </script>
</body>
</html>
