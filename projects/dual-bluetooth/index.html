<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dual Bluetooth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0c0c0c; overflow: hidden; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    #legend {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      pointer-events: none;
    }
    .leg {
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(232,230,225,0.4);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="legend">
    <div class="leg"><div class="dot" style="background:#4a9eff"></div>A2DP Audio</div>
    <div class="leg"><div class="dot" style="background:#3cdc8c"></div>Car Audio</div>
    <div class="leg"><div class="dot" style="background:#ffa03c"></div>BT Speaker</div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let W, H, t = 0;
    const mouse = { x: -9999, y: -9999 };

    // ── Color helper ─────────────────────────────────────────────
    function mkc(r, g, b) {
      return { r, g, b, css(a = 1) { return `rgba(${r},${g},${b},${a})`; } };
    }
    const BLUE   = mkc(74,  158, 255);
    const GREEN  = mkc(60,  220, 140);
    const ORANGE = mkc(255, 160,  60);
    const WHITE  = mkc(232, 230, 225);

    // ── Device node ───────────────────────────────────────────────
    class DeviceNode {
      constructor(fx, fy, label, sublabel, color) {
        this.fx = fx; this.fy = fy;  // fractional position
        this.label = label;
        this.sublabel = sublabel;
        this.color = color;
        this.phase = Math.random() * Math.PI * 2;
        this.x = 0; this.y = 0;
      }

      place() { this.x = this.fx * W; this.y = this.fy * H; }

      get hovered() {
        return Math.hypot(mouse.x - this.x, mouse.y - this.y) < 52;
      }

      draw() {
        const { x, y, color, phase } = this;
        const boost = this.hovered ? 1.35 : 1;

        // Expanding signal rings
        for (let i = 0; i < 5; i++) {
          const frac = ((t * 0.45 + phase * 0.3 + i / 5) % 1);
          const r    = 22 + frac * 100 * boost;
          const a    = (1 - frac) * 0.22 * boost;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.strokeStyle = color.css(a);
          ctx.lineWidth   = 1.2;
          ctx.stroke();
        }

        // Soft glow
        const grd = ctx.createRadialGradient(x, y, 0, x, y, 40 * boost);
        grd.addColorStop(0, color.css(0.28 * boost));
        grd.addColorStop(1, color.css(0));
        ctx.beginPath();
        ctx.arc(x, y, 40 * boost, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Core disc
        ctx.beginPath();
        ctx.arc(x, y, 15, 0, Math.PI * 2);
        ctx.fillStyle = color.css(0.92);
        ctx.fill();

        // Bluetooth ♭ symbol
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = 'rgba(12,12,12,0.85)';
        ctx.lineWidth  = 2;
        ctx.lineCap    = 'round';
        ctx.lineJoin   = 'round';
        const s = 6.5;
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.lineTo(0,  s);
        ctx.moveTo(0, -s);
        ctx.lineTo( s * 0.75, -s * 0.4);
        ctx.lineTo(0, 0);
        ctx.lineTo( s * 0.75,  s * 0.4);
        ctx.lineTo(0,  s);
        ctx.stroke();
        ctx.restore();

        // Label
        const la = this.hovered ? 0.95 : 0.6;
        ctx.textAlign = 'center';
        ctx.font = `${this.hovered ? '600 ' : ''}13px system-ui`;
        ctx.fillStyle = WHITE.css(la);
        ctx.fillText(this.label, x, y + 32);
        ctx.font = '10px system-ui';
        ctx.fillStyle = color.css(la * 0.75);
        ctx.fillText(this.sublabel, x, y + 46);
      }
    }

    // ── Particle stream between two nodes ─────────────────────────
    class SignalStream {
      constructor(from, to, color, count, bidirectional = false) {
        this.from  = from;
        this.to    = to;
        this.color = color;
        this.bidirectional = bidirectional;
        this.particles = Array.from({ length: count }, (_, i) => ({
          t:     i / count,
          speed: 0.0022 + Math.random() * 0.0025,
          size:  1.4 + Math.random() * 2,
          bend:  (Math.random() - 0.5) * 70,
          back:  bidirectional && Math.random() < 0.35,
        }));
      }

      bezier(p, frac) {
        const { from, to } = this;
        const mx = (from.x + to.x) / 2;
        const my = (from.y + to.y) / 2 + p.bend;
        const u  = p.back ? 1 - frac : frac;
        return {
          x: (1-u)*(1-u)*from.x + 2*(1-u)*u*mx + u*u*to.x,
          y: (1-u)*(1-u)*from.y + 2*(1-u)*u*my + u*u*to.y,
        };
      }

      drawPath() {
        // Average bend across particles
        const bend = this.particles.reduce((s, p) => s + p.bend, 0) / this.particles.length;
        const { from, to } = this;
        const mx = (from.x + to.x) / 2;
        const my = (from.y + to.y) / 2 + bend;

        ctx.save();
        ctx.setLineDash([5, 11]);
        ctx.lineDashOffset = -(t * 22) % 16;
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.quadraticCurveTo(mx, my, to.x, to.y);
        ctx.strokeStyle = this.color.css(0.11);
        ctx.lineWidth   = 1;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      update() {
        for (const p of this.particles) {
          p.t += p.speed;
          if (p.t >= 1) p.t -= 1;
        }
      }

      draw() {
        this.drawPath();
        for (const p of this.particles) {
          const { x, y } = this.bezier(p, p.t);
          const fade = Math.sin(p.t * Math.PI);
          ctx.beginPath();
          ctx.arc(x, y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color.css(fade * 0.82);
          ctx.fill();
        }
      }
    }

    // ── Scene setup ───────────────────────────────────────────────
    let nodes, streams;

    function init() {
      nodes = [
        new DeviceNode(0.22, 0.50, 'iPhone',       'A2DP · BLE',    BLUE  ),
        new DeviceNode(0.67, 0.28, 'Car Audio',     'A2DP + CarPlay', GREEN ),
        new DeviceNode(0.67, 0.72, 'Peter Millar',  'BT Speaker',    ORANGE),
      ];
      nodes.forEach(n => n.place());

      streams = [
        new SignalStream(nodes[0], nodes[1], BLUE,   32, true),
        new SignalStream(nodes[0], nodes[2], ORANGE, 20, true),
      ];
    }

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      nodes && nodes.forEach(n => n.place());
    }

    // ── Render loop ───────────────────────────────────────────────
    function frame() {
      // Soft trail — persistence of vision effect
      ctx.fillStyle = 'rgba(12,12,12,0.17)';
      ctx.fillRect(0, 0, W, H);

      streams.forEach(s => { s.update(); s.draw(); });
      nodes.forEach(n => n.draw());

      // Subtle title watermark
      ctx.save();
      ctx.globalAlpha = 0.1;
      ctx.fillStyle = WHITE.css(1);
      ctx.font = '11px system-ui';
      ctx.textAlign = 'right';
      ctx.fillText('Hover a node', W - 16, 20);
      ctx.restore();

      t += 0.016;
      requestAnimationFrame(frame);
    }

    // ── Events ────────────────────────────────────────────────────
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    canvas.addEventListener('mouseleave', () => { mouse.x = mouse.y = -9999; });

    init();
    resize();
    frame();
  </script>
</body>
</html>
