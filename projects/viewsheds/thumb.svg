<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="mapglow" cx="38%" cy="52%" r="40%">
      <stop offset="0%" stop-color="#1a2a1a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080c10" stop-opacity="1"/>
    </radialGradient>
    <clipPath id="mapclip">
      <rect x="0" y="0" width="480" height="450"/>
    </clipPath>
    <clipPath id="diagclip">
      <rect x="480" y="0" width="320" height="450"/>
    </clipPath>
  </defs>

  <!-- Background -->
