    <circle cx="200" cy="230" r="12" fill="none" stroke="#46BAB4" stroke-width="1.5" opacity="0.5"/>
    <circle cx="200" cy="230" r="20" fill="none" stroke="#46BAB4" stroke-width="0.8" opacity="0.25"/>

    <!-- Terrain ridge lines (background mountains) -->
