      <ellipse cx="200" cy="230" rx="75"  ry="52"/>
      <ellipse cx="200" cy="230" rx="110" ry="76"/>
      <ellipse cx="200" cy="230" rx="148" ry="103"/>
      <ellipse cx="200" cy="230" rx="190" ry="133"/>
      <ellipse cx="200" cy="230" rx="235" ry="165"/>
      <ellipse cx="200" cy="230" rx="285" ry="200"/>
    </g>

    <!-- Viewshed fill wedge (roughly NW-NE visible sector) -->
    <path d="M200,230
             L 62,80 Q 90,60 120,55 L 160,65 Q 190,50 220,48
             L 260,58 Q 300,55 330,70 L 370,95 Q 400,120 390,145
             L 350,130 Q 310,110 270,115 L 230,108 Q 200,105 170,112
