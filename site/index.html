<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe-rary</title>
  <meta name="description" content="A personal library of apps, tools, and interactive studies." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">
        <span class="site-logo-text">Vibe<span>-rary</span></span>
      </a>
      <nav class="site-nav">
        <a href="index.html" class="active">Library</a>
        <a href="upload.html">Upload</a>
      </nav>
    </div>
  </header>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="container">
      <div class="filter-row">
        <input
          type="search"
          class="search-input"
          id="search-input"
          placeholder="Search projects..."
          autocomplete="off"
        />
        <select class="filter-select" id="status-filter">
          <option value="all">All status</option>
          <option value="published">Published</option>
          <option value="draft">Draft</option>
          <option value="archived">Archived</option>
        </select>
        <select class="filter-select" id="sort-select">
          <option value="date-desc">Newest first</option>
          <option value="date-asc">Oldest first</option>
          <option value="title-asc">A → Z</option>
          <option value="title-desc">Z → A</option>
        </select>
        <span class="filter-count" id="filter-count"></span>
      </div>
      <div class="tag-pills" id="tag-pills">
        <span class="tag-pills-label">Tags</span>
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main>
    <div class="container">
      <div class="project-grid" id="project-grid">
        <div class="empty-state" id="loading-state">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <span class="footer-text">Vibe-rary</span>
      <div class="footer-links">
        <a href="https://github.com/woodhouse711/web-dashboard" target="_blank" rel="noopener">GitHub</a>
        <a href="upload.html">Add Project</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
